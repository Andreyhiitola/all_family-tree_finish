<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта семьи</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1209; --bg2: #241810; --panel: #2e2116;
      --border: rgba(201,169,110,0.25); --gold: #c9a96e; --gold-light: #e8d5a3;
      --text: #f0e6d0; --text-muted: #9a8a76;
      --birth: #4caf82; --live: #5b9bd5; --death: #cc4444; --event: #d4a017;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .map-header { height: 52px; display: flex; align-items: center; gap: 16px; padding: 0 20px; background: linear-gradient(135deg, #1a1209, #3d2b1a); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
    .map-header h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 0.05em; white-space: nowrap; }
    .back-btn { background: rgba(201,169,110,0.12); border: 1px solid var(--border); color: var(--gold); border-radius: 20px; padding: 4px 14px; font-family: 'Crimson Pro', Georgia, serif; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; text-decoration: none; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .back-btn:hover { background: rgba(201,169,110,0.22); }
    .layer-filters { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .layer-btn { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 16px; border: 1px solid; font-family: 'Crimson Pro', Georgia, serif; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s, transform 0.15s; white-space: nowrap; background: none; }
    .layer-btn.off { opacity: 0.35; }
    .layer-btn:hover { transform: translateY(-1px); }
    .layer-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .layer-btn[data-layer="birth"] { border-color: var(--birth); color: var(--birth); }
    .layer-btn[data-layer="live"]  { border-color: var(--live);  color: var(--live); }
    .layer-btn[data-layer="death"] { border-color: var(--death); color: var(--death); }
    .people-count { font-size: 0.78rem; color: var(--text-muted); font-style: italic; white-space: nowrap; }

    /* ── BODY ── */
    .map-body { flex: 1; display: flex; overflow: hidden; position: relative; }
    #map-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
    #map-wrap:active { cursor: grabbing; }
    #world-svg { width: 100%; height: 100%; display: block; }
    .country { fill: #2a3d2a; stroke: #1a2a1a; stroke-width: 0.3px; transition: fill 0.2s; }
    .country:hover { fill: #35502a; }
    .ocean { fill: #0d1a2a; }
    .map-marker { cursor: pointer; }
    .map-marker:hover { filter: brightness(1.2); }
    .cluster-circle { cursor: pointer; }
    .cluster-circle:hover { filter: brightness(1.15); }

    /* ── SIDEBAR — desktop ── */
    .map-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .sidebar-header h3 { font-family: 'Playfair Display', Georgia, serif; font-size: 0.95rem; color: var(--gold-light); flex: 1; }
    /* Close button — hidden on desktop */
    .sidebar-close { display: none; background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 2px 6px; line-height: 1; }
    #place-search { width: 100%; padding: 6px 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 16px; color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 0.85rem; outline: none; margin-top: 8px; display: block; }
    #place-search:focus { border-color: var(--gold); }
    #place-search::placeholder { color: var(--text-muted); }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: #5a3e28 transparent; }
    .place-group { margin-bottom: 10px; }
    .place-group-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 4px 8px 2px; font-family: 'Playfair Display', Georgia, serif; }
    .place-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .place-item:hover { background: rgba(201,169,110,0.1); }
    .place-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .place-name { font-size: 0.85rem; flex: 1; }
    .place-cnt { font-size: 0.72rem; color: var(--text-muted); font-style: italic; }

    /* ── SIDEBAR TOGGLE BUTTON — mobile only ── */
    #sidebar-toggle {
      display: none;
      position: absolute;
      bottom: 72px;
      right: 12px;
      z-index: 30;
      background: linear-gradient(135deg, #3d2b1a, #2a1f14);
      border: 1px solid var(--gold);
      border-radius: 24px;
      color: var(--gold-light);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 0.82rem;
      padding: 8px 14px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      gap: 6px;
      align-items: center;
    }

    /* ── POPUP ── */
    #person-popup { position: fixed; z-index: 200; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); width: 230px; overflow: hidden; pointer-events: none; opacity: 0; transform: translateY(6px) scale(0.97); transition: opacity 0.18s, transform 0.18s; }
    #person-popup.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .popup-avatar { width: 100%; height: 100px; object-fit: cover; display: block; }
    .popup-avatar-placeholder { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: linear-gradient(135deg, #2a3d2a, #1a2a1a); }
    .popup-body { padding: 10px 12px 12px; }
    .popup-name { font-family: 'Playfair Display', Georgia, serif; font-size: 0.95rem; color: var(--gold-light); margin-bottom: 4px; }
    .popup-meta { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }
    .popup-meta span { color: var(--text); }
    .popup-events { margin-top: 7px; display: flex; flex-direction: column; gap: 3px; }
    .popup-event { font-size: 0.76rem; display: flex; align-items: center; gap: 5px; }
    .ev-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── ZOOM ── */
    .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
    .zoom-btn { width: 32px; height: 32px; background: rgba(45,30,15,0.9); border: 1px solid var(--border); border-radius: 6px; color: var(--gold); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .zoom-btn:hover { background: rgba(60,42,20,0.95); }
    .map-legend { position: absolute; bottom: 20px; left: 20px; background: rgba(20,12,4,0.88); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.75rem; z-index: 10; }
    .legend-title { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: var(--text-muted); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── LOADING ── */
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 50; flex-direction: column; gap: 12px; }
    .loading-text { font-family: 'Playfair Display', Georgia, serif; color: var(--gold); font-size: 1rem; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid rgba(201,169,110,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      /* Скрываем фильтры в хедере — переносим на карту */
      .layer-filters { display: none; }
      .people-count { display: none; }
      .map-header { gap: 10px; padding: 0 12px; }
      .map-header h1 { font-size: 0.95rem; }

      /* Sidebar становится slide-up панелью снизу */
      .map-sidebar {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        width: 100% !important;
        height: 60vh;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        z-index: 20;
        transform: translateY(100%); /* скрыта по умолчанию */
        box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
      }
      .map-sidebar.open { transform: translateY(0); }

      /* Кнопка открытия sidebar */
      #sidebar-toggle { display: flex; }

      /* Кнопка закрытия внутри sidebar */
      .sidebar-close { display: block; }

      /* Sidebar header адаптирован */
      .sidebar-header { padding: 12px 14px 8px; }
      .sidebar-header h3 { font-size: 0.9rem; }

      /* Мобильные фильтры слои — показываем на карте */
      .mobile-layer-filters {
        display: flex;
        position: absolute;
        top: 10px; left: 50%; transform: translateX(-50%);
        gap: 6px; z-index: 10;
      }
      .mobile-layer-filters .layer-btn { font-size: 0.72rem; padding: 3px 9px; }

      /* Zoom controls — сдвигаем чуть выше кнопки sidebar */
      .zoom-controls { bottom: 130px; right: 12px; }

      /* Legend — меньше и левее */
      .map-legend { bottom: 10px; left: 10px; padding: 7px 10px; font-size: 0.68rem; }

      /* Popup на мобиле — снизу */
      #person-popup { width: calc(100vw - 24px); left: 12px !important; right: 12px; bottom: 12px; top: auto !important; transform: translateY(10px) scale(0.97); }
      #person-popup.visible { transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
<div class="map-header">
  <a href="index.html" class="back-btn">← Дерево</a>
  <h1>🗺 Карта семьи</h1>
  <div class="layer-filters">
    <button class="layer-btn" data-layer="birth" onclick="toggleLayer('birth')"><span class="dot" style="background:var(--birth)"></span> Рождение</button>
    <button class="layer-btn" data-layer="live"  onclick="toggleLayer('live')"><span class="dot" style="background:var(--live)"></span> Проживание</button>
    <button class="layer-btn" data-layer="death" onclick="toggleLayer('death')"><span class="dot" style="background:var(--death)"></span> Смерть</button>
  </div>
  <span class="people-count" id="people-count"></span>
</div>

<div class="map-body">
  <div id="map-wrap">
    <div id="loading"><div class="loading-spinner"></div><div class="loading-text">Загрузка карты...</div></div>
    <svg id="world-svg" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- Мобильные фильтры слоёв поверх карты -->
    <div class="mobile-layer-filters" style="display:none">
      <button class="layer-btn" data-layer="birth" data-mobile="1" onclick="toggleLayer('birth')"><span class="dot" style="background:var(--birth)"></span> Рожд.</button>
      <button class="layer-btn" data-layer="live"  data-mobile="1" onclick="toggleLayer('live')"><span class="dot" style="background:var(--live)"></span> Жил</button>
      <button class="layer-btn" data-layer="death" data-mobile="1" onclick="toggleLayer('death')"><span class="dot" style="background:var(--death)"></span> Смерть</button>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <button class="zoom-btn" onclick="zoomReset()" title="Сбросить">⌂</button>
    </div>
    <div class="map-legend">
      <div class="legend-title">Легенда</div>
      <div class="legend-row"><span class="legend-dot" style="background:var(--birth)"></span> Рождение</div>
      <div class="legend-row"><span class="legend-dot" style="background:var(--live)"></span> Проживание</div>
      <div class="legend-row"><span class="legend-dot" style="background:var(--death)"></span> Смерть</div>
    </div>
  </div>

  <!-- Кнопка открытия sidebar на мобиле -->
  <button id="sidebar-toggle" onclick="toggleSidebar()">📍 Места</button>

  <aside class="map-sidebar" id="map-sidebar">
    <div class="sidebar-header">
      <h3>Места на карте</h3>
      <button class="sidebar-close" onclick="toggleSidebar()">×</button>
    </div>
    <input id="place-search" type="text" placeholder="🔍 Поиск города...">
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>
</div>

<div id="person-popup"></div>

<script src="d3.v7.min.js"></script>
<script>
// ── Показать мобильные фильтры если нужно ──────────────────────────────────
function checkMobile() {
  const isMobile = window.innerWidth <= 768
  const mobileFilters = document.querySelector('.mobile-layer-filters')
  if (mobileFilters) mobileFilters.style.display = isMobile ? 'flex' : 'none'
}
checkMobile()
window.addEventListener('resize', checkMobile)

// ── Sidebar toggle ─────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('map-sidebar')
  sidebar.classList.toggle('open')
  const btn = document.getElementById('sidebar-toggle')
  btn.textContent = sidebar.classList.contains('open') ? '✕ Закрыть' : '📍 Места'
}

// ── Закрыть sidebar при клике на карту (мобиль) ────────────────────────────
document.getElementById('map-wrap').addEventListener('click', () => {
  const sidebar = document.getElementById('map-sidebar')
  if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
    sidebar.classList.remove('open')
    document.getElementById('sidebar-toggle').textContent = '📍 Места'
  }
})

function resolveCoords(place) {
  if (!place) return null
  const key = place.toLowerCase().trim().replace(/^г\./,'').replace(/^гор\./,'').replace(/^город /,'').trim()
  for (const [k,v] of Object.entries(CITY_COORDS)) {
    if (key.includes(k) || k.includes(key)) return v
  }
  return null
}

let people = [], activeLayers = {birth:true,live:true,death:true}
let transform = {x:0,y:0,k:1}, isDragging = false, dragStart = null
const SVG_W = 960, SVG_H = 500

async function loadData() {
  try {
    const stored = localStorage.getItem('familyTreeData')
    if (stored) { const d = JSON.parse(stored); people = d.people || d || [] }
  } catch(e) {}
  if (!people.length) {
    try { const r = await fetch('data/people.json'); const d = await r.json(); people = d.people || d } catch(e) {}
  }
  document.getElementById('people-count').textContent = people.length + ' человек'
}

function worldToSvg(lat, lon) {
  const proj = d3.geoMercator().scale(153).translate([SVG_W/2, SVG_H/1.5])
  return proj([lon, lat])
}

async function buildMap() {
  const svg = document.getElementById('world-svg')
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`)
  const ocean = document.createElementNS('http://www.w3.org/2000/svg','rect')
  ocean.setAttribute('width',SVG_W); ocean.setAttribute('height',SVG_H); ocean.setAttribute('class','ocean')
  svg.appendChild(ocean)
  const g = document.createElementNS('http://www.w3.org/2000/svg','g')
  g.id = 'map-g'; svg.appendChild(g)

  try {
    const r = await fetch('data/world.geojson')
    if (r.ok) {
      const geoData = await r.json()
      const proj = d3.geoMercator().scale(153).translate([SVG_W/2, SVG_H/1.5])
      const path = d3.geoPath().projection(proj)
      geoData.features.forEach(feature => {
        const el = document.createElementNS('http://www.w3.org/2000/svg','path')
        el.setAttribute('d', path(feature))
        el.setAttribute('class','country')
        g.appendChild(el)
      })
    } else { drawFallback(g) }
  } catch(e) { drawFallback(g) }

  ;['birth','live','death'].forEach(layer => {
    const lg = document.createElementNS('http://www.w3.org/2000/svg','g')
    lg.id = `layer-${layer}`; g.appendChild(lg)
  })
  document.getElementById('loading').style.display = 'none'
}

function drawFallback(g) {
  [[35,-10,71,40],[35,40,80,180],[-35,-20,37,51],[15,-170,72,-50],[-55,-81,12,-35],[-47,113,-10,154]].forEach(([la1,lo1,la2,lo2]) => {
    const proj = d3.geoMercator().scale(153).translate([SVG_W/2,SVG_H/1.5])
    const [x1,y1] = proj([lo1,la2]), [x2,y2] = proj([lo2,la1])
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect')
    rect.setAttribute('x',x1); rect.setAttribute('y',y1)
    rect.setAttribute('width',x2-x1); rect.setAttribute('height',y2-y1)
    rect.setAttribute('class','country'); g.appendChild(rect)
  })
}

function getColor(layer) { return {birth:'#4caf82',live:'#5b9bd5',death:'#cc4444'}[layer] }

function buildMarkers() {
  const places = {}
  people.forEach(person => {
    const events = []
    if (person.events && person.events.length) {
      person.events.forEach(ev => {
        if (ev.place && (ev.type === 'birth' || ev.type === 'live' || ev.type === 'death')) {
          events.push({ place: ev.place, layer: ev.type })
        }
      })
    } else {
      if (person.birthPlace) events.push({place: person.birthPlace, layer: 'birth'})
      if (person.deathDate && person.birthPlace) events.push({place: person.birthPlace, layer: 'death'})
    }
    events.forEach(({place,layer}) => {
      const coords = resolveCoords(place)
      if (!coords) return
      const key = coords.join(',') + '_' + layer
      if (!places[key]) places[key] = {lat:coords[0],lon:coords[1],label:place,layer,people:[]}
      places[key].people.push(person)
    })
  })

  ;['birth','live','death'].forEach(l => { document.getElementById(`layer-${l}`).innerHTML = '' })

  Object.values(places).forEach(place => {
    const lg = document.getElementById(`layer-${place.layer}`)
    if (!lg) return
    const [svgX, svgY] = worldToSvg(place.lat, place.lon)
    const color = getColor(place.layer)
    if (place.people.length === 1) drawMarker(lg, svgX, svgY, place.people[0], place.layer, color, place.label)
    else drawCluster(lg, svgX, svgY, place.people, place.layer, color, place.label)
  })

  buildSidebar(places)
}

function drawMarker(g, x, y, person, layer, color, place) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','g')
  el.setAttribute('class','map-marker')
  el.setAttribute('transform',`translate(${x},${y})`)
  el.dataset.ox = x; el.dataset.oy = y

  const bg = document.createElementNS('http://www.w3.org/2000/svg','circle')
  bg.setAttribute('r',10); bg.setAttribute('fill',color); bg.setAttribute('opacity','0.85')
  bg.setAttribute('stroke','rgba(255,255,255,0.3)'); bg.setAttribute('stroke-width','1.5')
  el.appendChild(bg)

  if (person.photo) {
    const clipId = `clip-${person.id}-${layer}`
    const defs = g.querySelector('defs') || (() => { const d = document.createElementNS('http://www.w3.org/2000/svg','defs'); g.insertBefore(d,g.firstChild); return d })()
    const clip = document.createElementNS('http://www.w3.org/2000/svg','clipPath')
    clip.setAttribute('id',clipId)
    const cc = document.createElementNS('http://www.w3.org/2000/svg','circle')
    cc.setAttribute('r','10'); clip.appendChild(cc); defs.appendChild(clip)
    const img = document.createElementNS('http://www.w3.org/2000/svg','image')
    img.setAttribute('href',person.photo); img.setAttribute('x',-10); img.setAttribute('y',-10)
    img.setAttribute('width',20); img.setAttribute('height',20)
    img.setAttribute('clip-path',`url(#${clipId})`); el.appendChild(img)
  } else {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text')
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dy','0.35em')
    txt.setAttribute('fill','white'); txt.setAttribute('font-size','7')
    txt.setAttribute('font-weight','bold'); txt.setAttribute('font-family','sans-serif')
    txt.setAttribute('pointer-events','none')
    txt.textContent = (person.name||'?')[0] + (person.surname||'?')[0]
    el.appendChild(txt)
  }

  el.dataset.place = place
  el.addEventListener('click', e => { e.stopPropagation(); showPopup(person, layer, place, e) })
  el.addEventListener('mouseenter', e => showPopup(person, layer, place, e))
  el.addEventListener('mouseleave', hidePopup)
  g.appendChild(el)
}

function drawCluster(g, x, y, persons, layer, color, place) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','g')
  el.setAttribute('class','cluster-circle')
  el.setAttribute('transform',`translate(${x},${y})`)
  el.dataset.ox = x; el.dataset.oy = y
  const r = Math.min(8 + persons.length * 1.5, 18)
  const bg = document.createElementNS('http://www.w3.org/2000/svg','circle')
  bg.setAttribute('r',r); bg.setAttribute('fill',color); bg.setAttribute('opacity','0.82')
  bg.setAttribute('stroke','rgba(255,255,255,0.3)'); bg.setAttribute('stroke-width','1.5')
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text')
  txt.setAttribute('text-anchor','middle'); txt.setAttribute('dy','0.35em')
  txt.setAttribute('fill','white'); txt.setAttribute('font-size',Math.max(7,r*0.7))
  txt.setAttribute('font-weight','bold'); txt.setAttribute('font-family','sans-serif')
  txt.setAttribute('pointer-events','none'); txt.textContent = persons.length
  el.appendChild(bg); el.appendChild(txt)
  el.dataset.place = place
  el.addEventListener('click', e => { e.stopPropagation(); showCluster(persons, layer, color, place, e) })
  g.appendChild(el)
}

let popupTimer = null
function showPopup(person, layer, place, e) {
  clearTimeout(popupTimer)
  const popup = document.getElementById('person-popup')
  popup.innerHTML = (person.photo ? `<img class="popup-avatar" src="${person.photo}" onerror="this.style.display='none'">` : `<div class="popup-avatar-placeholder">👤</div>`) +
  `<div class="popup-body">
    <div class="popup-name">${person.name} ${person.surname}</div>
    <div class="popup-meta">
      ${person.birthDate ? `<div>Род. <span>${person.birthDate}</span></div>` : ''}
      ${person.deathDate ? `<div>Ум. <span>${person.deathDate}</span></div>` : ''}
    </div>
    <div class="popup-events">
      ${person.birthPlace ? `<div class="popup-event"><span class="ev-dot" style="background:var(--birth)"></span><span style="color:var(--text-muted)">Родился:</span> ${person.birthPlace}</div>` : ''}
      ${person.deathDate && person.birthPlace ? `<div class="popup-event"><span class="ev-dot" style="background:var(--death)"></span><span style="color:var(--text-muted)">Умер:</span> ${person.birthPlace}</div>` : ''}
    </div>
  </div>`
  positionPopup(popup, e); popup.classList.add('visible')
}

function showCluster(persons, layer, color, place, e) {
  const popup = document.getElementById('person-popup')
  popup.innerHTML = `<div class="popup-body">
    <div class="popup-name" style="color:${color}">${place}</div>
    <div class="popup-meta" style="margin-bottom:8px">${persons.length} человек</div>
    <div class="popup-events">
      ${persons.slice(0,6).map(p=>`<div class="popup-event"><span class="ev-dot" style="background:${color}"></span>${p.name} ${p.surname}</div>`).join('')}
      ${persons.length > 6 ? `<div style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">ещё ${persons.length-6}...</div>` : ''}
    </div>
  </div>`
  positionPopup(popup, e); popup.classList.add('visible')
}

function positionPopup(popup, e) {
  if (window.innerWidth <= 768) return // на мобиле позиционируется через CSS
  const pw=230,ph=260
  let left=e.clientX+14, top=e.clientY-60
  if(left+pw>window.innerWidth-10) left=e.clientX-pw-14
  if(top<8) top=8
  if(top+ph>window.innerHeight-8) top=window.innerHeight-ph-8
  popup.style.left=left+'px'; popup.style.top=top+'px'
}
function hidePopup() { popupTimer = setTimeout(() => document.getElementById('person-popup').classList.remove('visible'), 200) }
document.getElementById('person-popup').addEventListener('mouseenter', () => clearTimeout(popupTimer))
document.getElementById('person-popup').addEventListener('mouseleave', hidePopup)

function buildSidebar(places) {
  const byCountry = {}
  Object.values(places).forEach(place => {
    const country = guessCountry(place.label)
    if (!byCountry[country]) byCountry[country] = []
    if (!byCountry[country].find(p => p.label === place.label)) byCountry[country].push(place)
  })
  document.getElementById('sidebar-list').innerHTML = Object.entries(byCountry).sort((a,b)=>a[0].localeCompare(b[0])).map(([country,cPlaces]) => `
    <div class="place-group">
      <div class="place-group-title">${country}</div>
      ${cPlaces.map(place => `<div class="place-item" onclick="focusPlace(${place.lat},${place.lon})">
        <span class="place-dot" style="background:${getColor(place.layer)}"></span>
        <span class="place-name">${place.label}</span>
        <span class="place-cnt">${place.people.length}</span>
      </div>`).join('')}
    </div>`).join('')
}

function guessCountry(place) {
  const p = place.toLowerCase()
  if (p.includes('харьков')||p.includes('украин')) return '🇺🇦 Украина'
  if (p.includes('алма')||p.includes('балхаш')||p.includes('текели')||p.includes('казах')||p.includes('космос')||p.includes('джанашар')||p.includes('талды')) return '🇰🇿 Казахстан'
  if (p.includes('петербург')||p.includes('москва')||p.includes('россия')||p.includes('челябинск')||p.includes('вышег')) return '🇷🇺 Россия'
  if (p.includes('белорус')||p.includes('минск')) return '🇧🇾 Беларусь'
  if (p.includes('итал')||p.includes('рим')) return '🇮🇹 Италия'
  if (p.includes('нью-йорк')||p.includes('сша')||p.includes('америк')) return '🇺🇸 США'
  return '🌍 Другие'
}

function focusPlace(lat, lon) {
  const [x,y] = worldToSvg(lat,lon)
  const wrap = document.getElementById('map-wrap')
  transform.k = Math.max(transform.k, 4)
  transform.x = wrap.clientWidth/2 - x*transform.k
  transform.y = wrap.clientHeight/2 - y*transform.k
  applyTransform()
  // На мобиле закрываем sidebar после выбора места
  if (window.innerWidth <= 768) {
    document.getElementById('map-sidebar').classList.remove('open')
    document.getElementById('sidebar-toggle').textContent = '📍 Места'
  }
}

function toggleLayer(layer) {
  activeLayers[layer] = !activeLayers[layer]
  document.querySelectorAll(`[data-layer="${layer}"]`).forEach(btn => {
    btn.classList.toggle('off', !activeLayers[layer])
  })
  // Перерисовываем HTML overlay — он фильтрует по activeLayers
  syncMarkerOverlay()
}

// ── Touch / mouse events ───────────────────────────────────────────────────
const mapWrap = document.getElementById('map-wrap')
mapWrap.addEventListener('mousedown', e => { isDragging=true; dragStart={x:e.clientX-transform.x,y:e.clientY-transform.y}; e.preventDefault() })
mapWrap.addEventListener('mousemove', e => { if(!isDragging) return; transform.x=e.clientX-dragStart.x; transform.y=e.clientY-dragStart.y; applyTransform() })
mapWrap.addEventListener('mouseup', ()=>{ isDragging=false })
mapWrap.addEventListener('mouseleave', ()=>{ isDragging=false })
mapWrap.addEventListener('wheel', e => {
  e.preventDefault()
  const rect=mapWrap.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top
  const delta=e.deltaY<0?1.15:0.87
  const nk=Math.max(0.5,Math.min(12,transform.k*delta))
  transform.x=mx-(mx-transform.x)*(nk/transform.k)
  transform.y=my-(my-transform.y)*(nk/transform.k)
  transform.k=nk; applyTransform()
}, {passive:false})

// Touch support
let lastTouchDist = null
mapWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true
    dragStart = {x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y}
  } else if (e.touches.length === 2) {
    isDragging = false
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY)
  }
}, {passive:true})
mapWrap.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    transform.x = e.touches[0].clientX - dragStart.x
    transform.y = e.touches[0].clientY - dragStart.y
    applyTransform()
  } else if (e.touches.length === 2 && lastTouchDist) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY)
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2
    const rect = mapWrap.getBoundingClientRect()
    const mx = cx - rect.left, my = cy - rect.top
    const delta = dist / lastTouchDist
    const nk = Math.max(0.5, Math.min(12, transform.k * delta))
    transform.x = mx - (mx - transform.x) * (nk / transform.k)
    transform.y = my - (my - transform.y) * (nk / transform.k)
    transform.k = nk
    lastTouchDist = dist
    applyTransform()
  }
  e.preventDefault()
}, {passive:false})
mapWrap.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null })

function applyTransform() {
  document.getElementById('map-g').setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`)
  requestAnimationFrame(syncMarkerOverlay)
}

function syncMarkerOverlay() {
  const wrap = document.getElementById('map-wrap')
  let overlay = document.getElementById('marker-overlay')
  if (!overlay) {
    overlay = document.createElement('div')
    overlay.id = 'marker-overlay'
    overlay.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;'
    wrap.appendChild(overlay)
  }

  const markerData = []
  document.querySelectorAll('#map-g .map-marker, #map-g .cluster-circle').forEach(el => {
    // Определяем слой по id родительской группы: layer-birth, layer-live, layer-death
    const parentId = el.parentElement?.id || ''
    const layer = parentId.replace('layer-', '')
    // Пропускаем маркеры скрытых слоёв
    if (layer && activeLayers[layer] === false) return

    const ox = parseFloat(el.dataset.ox), oy = parseFloat(el.dataset.oy)
    if (isNaN(ox) || isNaN(oy)) return
    const svg = document.getElementById('world-svg')
    const svgRect = svg.getBoundingClientRect()
    const scaleX = svgRect.width / 960, scaleY = svgRect.height / 500
    const sx = ox * transform.k * scaleX + transform.x * scaleX
    const sy = oy * transform.k * scaleY + transform.y * scaleY
    markerData.push({ el, ox, oy, sx, sy })
  })

  const R = 14
  for (let iter = 0; iter < 40; iter++) {
    let moved = false
    for (let i = 0; i < markerData.length; i++) {
      for (let j = i + 1; j < markerData.length; j++) {
        const a = markerData[i], b = markerData[j]
        const dx = b.sx - a.sx, dy = b.sy - a.sy
        const dist = Math.sqrt(dx*dx + dy*dy)
        const minD = R * 2.2
        if (dist < minD && dist > 0.001) {
          const push = (minD - dist) / 2
          const nx = dx/dist, ny = dy/dist
          a.sx -= nx*push; a.sy -= ny*push
          b.sx += nx*push; b.sy += ny*push
          moved = true
        }
      }
    }
    if (!moved) break
  }

  document.querySelectorAll('#map-g .map-marker, #map-g .cluster-circle').forEach(el => { el.style.display = 'none' })

  overlay.innerHTML = ''
  markerData.forEach(({ el, sx, sy }) => {
    const circle = el.querySelector('circle')
    const fill = circle ? circle.getAttribute('fill') : '#999'
    const img = el.querySelector('image')
    const txt = el.querySelector('text')
    const count = txt ? txt.textContent : ''

    const div = document.createElement('div')
    div.style.cssText = `position:absolute;left:${sx}px;top:${sy}px;transform:translate(-50%,-50%);
      width:28px;height:28px;border-radius:50%;background:${fill};
      border:2px solid rgba(255,255,255,0.35);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:bold;color:white;font-family:sans-serif;
      cursor:pointer;pointer-events:auto;overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.4);`

    if (img) {
      const href = img.getAttribute('href')
      div.innerHTML = `<img src="${href}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='${count||'?'}'"/>`
    } else {
      div.textContent = count || '?'
    }

    const label = document.createElement('div')
    label.textContent = el.dataset.place || ''
    label.style.cssText = `position:absolute;top:32px;left:50%;transform:translateX(-50%);
      white-space:nowrap;background:rgba(20,12,4,0.82);color:#e8d5a3;
      font-size:10px;font-family:'Crimson Pro',Georgia,serif;
      padding:2px 6px;border-radius:4px;border:1px solid rgba(201,169,110,0.3);
      pointer-events:none;opacity:0;transition:opacity 0.15s;`
    div.appendChild(label)

    div.addEventListener('mouseenter', e => { label.style.opacity='1'; el.dispatchEvent(new MouseEvent('mouseenter',{clientX:e.clientX,clientY:e.clientY})) })
    div.addEventListener('mouseleave', e => { label.style.opacity='0'; el.dispatchEvent(new MouseEvent('mouseleave',{})) })
    div.addEventListener('click', e => { e.stopPropagation(); el.dispatchEvent(new MouseEvent('click',{clientX:e.clientX,clientY:e.clientY,bubbles:false})) })
    // Touch tap
    div.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); el.dispatchEvent(new MouseEvent('click',{clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY,bubbles:false})) })

    overlay.appendChild(div)
  })
}

function zoomIn()  { const cx=mapWrap.clientWidth/2,cy=mapWrap.clientHeight/2,nk=Math.min(12,transform.k*1.3); transform.x=cx-(cx-transform.x)*(nk/transform.k); transform.y=cy-(cy-transform.y)*(nk/transform.k); transform.k=nk; applyTransform() }
function zoomOut() { const cx=mapWrap.clientWidth/2,cy=mapWrap.clientHeight/2,nk=Math.max(0.5,transform.k/1.3); transform.x=cx-(cx-transform.x)*(nk/transform.k); transform.y=cy-(cy-transform.y)*(nk/transform.k); transform.k=nk; applyTransform() }
function zoomReset() { transform={x:0,y:0,k:1}; applyTransform() }

document.getElementById('place-search').addEventListener('input', function() {
  const q=this.value.toLowerCase()
  document.querySelectorAll('.place-item').forEach(item => { item.style.display=item.querySelector('.place-name').textContent.toLowerCase().includes(q)?'':'none' })
})

async function init() { await loadData(); await buildMap(); buildMarkers() }
init()
</script>
